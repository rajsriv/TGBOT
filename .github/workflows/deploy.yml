name: Deploy Bot to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ubuntu
        key: ${{ secrets.ORACLE_SSH_KEY }}
        script: |
          cd /home/ubuntu/TGBOT
          git pull origin main
          /home/ubuntu/TGBOT/venv/bin/pip install -r requirements.txt
          sudo systemctl restart fireash
